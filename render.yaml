# Render Blueprint Specification for Campus Connect Backend
# To deploy, go to Dashboard -> Blueprints -> New Blueprint Instance in Render.

services:
  - type: web
    name: campus-connect-backend
    # Options: 'docker' (recommended for consistency) or 'node' (native Node.js deployment)
    runtime: docker
    
    # Optional native Node.js deployment fields (uncomment if you change runtime to 'node')
    # buildCommand: npm install && npm run prisma:generate && npm run build
    # startCommand: npm start

    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      
      # Database and external integrations (values should be filled in the Render dashboard)
      - key: DATABASE_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      
      # JWT Authentication configurations
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d

      # Optional Email configurations (Resend)
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM_AUTH
        value: "Kizuna Auth <noreply@auth.yourdomain.com>"
      - key: MAIL_FROM_ORG
        value: "Kizuna Org <onboarding@org.yourdomain.com>"
      - key: MAIL_FROM_SECURITY
        value: "Kizuna Security <security@auth.yourdomain.com>"
      - key: MAIL_FROM_GENERAL
        value: "Kizuna <hello@yourdomain.com>"
      - key: MAIL_REPLY_TO
        value: "support@yourdomain.com"
